# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]
junit-jupiter = "6.0.1"
assertj-core = "3.27.7"
checker = "4.1.0"
jsemver = "3.1.0"
filesystemview-base = "1.0.0-rc.1"
filesystemview-fx   = "1.0.0-rc.1"

[libraries]
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }
assertj-core = { group = "org.assertj", name = "assertj-core", version.ref = "assertj-core" }
checker = { group = "org.checkerframework", name = "checker", version.ref = "checker" }
jsemver = { group = "de.bernd-michaely", name = "jsemver", version.ref = "jsemver" }
filesystemview-base = { group = "de.bernd-michaely", name = "lib-filesystem-view-base", version.ref = "filesystemview-base" }
filesystemview-fx   = { group = "de.bernd-michaely", name = "lib-filesystem-view-fx",   version.ref = "filesystemview-fx" }

[bundles]
filesystemview = [ "filesystemview-base", "filesystemview-fx" ]
assertj = [ "assertj-core" ]
